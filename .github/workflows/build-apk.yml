name: APK Derle

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: APK oluştur
        run: gradle assembleDebug --stacktrace
      - name: Dosyayı adlandır
        run: cp app/build/outputs/apk/debug/app-debug.apk "Anket Rapor Mobil.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: Anket-Rapor-Mobil-APK
          path: Anket Rapor Mobil.apk
          if-no-files-found: error
