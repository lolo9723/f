name: Android APK

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: APK derle
        run: gradle assembleDebug --stacktrace
      - name: APK adını düzenle
        run: cp app/build/outputs/apk/debug/app-debug.apk "Anket Rapor Mobil.apk"
      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: Anket-Rapor-Mobil-APK
          path: Anket Rapor Mobil.apk
